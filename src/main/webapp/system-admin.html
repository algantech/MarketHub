<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketHub System Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/app.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1">System Admin Paneli</h1>
            <p class="text-secondary mb-0" id="adminWelcomeText">Yukleniyor...</p>
        </div>
        <button class="btn btn-outline-secondary" id="logoutButton" type="button">Cikis</button>
    </div>

    <div id="adminAlert" class="alert d-none"></div>

    <div class="row g-4">
        <section class="col-lg-4">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h2 class="h5 mb-0">Firmalar</h2>
                        <button class="btn btn-sm btn-outline-primary" id="newCompanyButton" type="button">Yeni Firma</button>
                    </div>

                    <form id="companyForm" class="border rounded p-3 mb-3 bg-body-tertiary">
                        <input id="companyId" type="hidden">
                        <div class="mb-3">
                            <label class="form-label" for="companyName">Firma Adi</label>
                            <input class="form-control" id="companyName" required>
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" id="companyActive" type="checkbox" checked>
                            <label class="form-check-label" for="companyActive">Aktif</label>
                        </div>
                        <div class="d-flex gap-2">
                            <button class="btn btn-primary" type="submit" id="saveCompanyButton">Kaydet</button>
                            <button class="btn btn-outline-secondary" type="button" id="cancelCompanyButton">Temizle</button>
                        </div>
                    </form>

                    <div id="companyList" class="list-group company-list"></div>
                </div>
            </div>
        </section>

        <section class="col-lg-8">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div>
                            <h2 class="h5 mb-1">Kullanicilar</h2>
                            <p class="text-secondary mb-0" id="selectedCompanyText">Bir firma seciniz</p>
                        </div>
                        <button class="btn btn-sm btn-outline-primary" id="newUserButton" type="button" disabled>Yeni Kullanici</button>
                    </div>

                    <form id="userForm" class="border rounded p-3 mb-3 bg-body-tertiary">
                        <input id="userId" type="hidden">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label" for="userFullName">Ad Soyad</label>
                                <input class="form-control" id="userFullName" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="userUsername">Kullanici Adi</label>
                                <input class="form-control" id="userUsername" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="userEmail">E-posta</label>
                                <input class="form-control" id="userEmail" type="email" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="userPassword">Sifre</label>
                                <input class="form-control" id="userPassword" type="password">
                                <div class="form-text">Guncellemede bos birakirsan degismez.</div>
                            </div>
                        </div>

                        <div class="mt-3">
                            <label class="form-label d-block">Roller</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input user-role" id="roleCompanyAdmin" type="checkbox" value="COMPANY_ADMIN">
                                <label class="form-check-label" for="roleCompanyAdmin">Company Admin</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input user-role" id="roleViewer" type="checkbox" value="VIEWER">
                                <label class="form-check-label" for="roleViewer">Viewer</label>
                            </div>
                        </div>

                        <div class="form-check mt-3 mb-3">
                            <input class="form-check-input" id="userActive" type="checkbox" checked>
                            <label class="form-check-label" for="userActive">Aktif</label>
                        </div>

                        <div class="d-flex gap-2">
                            <button class="btn btn-primary" id="saveUserButton" type="submit" disabled>Kaydet</button>
                            <button class="btn btn-outline-secondary" id="cancelUserButton" type="button" disabled>Temizle</button>
                        </div>
                    </form>

                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                            <tr>
                                <th>Ad Soyad</th>
                                <th>Kullanici Adi</th>
                                <th>E-posta</th>
                                <th>Roller</th>
                                <th>Durum</th>
                                <th class="text-end">Islem</th>
                            </tr>
                            </thead>
                            <tbody id="userTableBody">
                            <tr>
                                <td class="text-secondary" colspan="6">Bir firma seciniz.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/system-admin.js"></script>
</body>
</html>
