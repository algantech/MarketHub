spring:
  application:
    name: markethub-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/markethub}
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8090}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-123456}
    access-expiration-seconds: ${JWT_ACCESS_EXPIRATION_SECONDS:900}
    refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION_SECONDS:604800}
    issuer: ${JWT_ISSUER:markethub}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5500,http://127.0.0.1:5500}
  bootstrap:
    enabled: ${BOOTSTRAP_ENABLED:true}
    system-admin:
      username: ${SYSTEM_ADMIN_USERNAME:tahir}
      password: ${SYSTEM_ADMIN_PASSWORD:HGS71mw9}
      full-name: ${SYSTEM_ADMIN_FULL_NAME:System Admin}
      email: ${SYSTEM_ADMIN_EMAIL:sysadmin@localhost}

logging:
  level:
    org.springframework.security: INFO
