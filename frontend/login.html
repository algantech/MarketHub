<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketHub Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/app.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 mb-3">MarketHub</h1>
                    <p class="text-secondary">Sistem girisi</p>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label" for="username">Kullanici Adi</label>
                            <input class="form-control" id="username" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="password">Sifre</label>
                            <input class="form-control" id="password" name="password" type="password" required>
                        </div>
                        <div id="loginError" class="alert alert-danger d-none"></div>
                        <button class="btn btn-primary w-100" type="submit">Giris Yap</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
</body>
</html>
